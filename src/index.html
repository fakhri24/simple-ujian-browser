<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Ujian Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      user-select: none;
    }
    .loading { text-align: center; }
    .loading h1 { font-size: 2rem; margin-bottom: 1rem; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading">
    <h1>Simple Ujian Browser</h1>
    <p>Memuat ujian...</p>
    <div class="spinner"></div>
  </div>
  <script>
    // Inject SEB detection for simple-ujian compatibility
    window.SafeExamBrowser = { version: "1.0.0", custom: true };
  </script>
</body>
</html>
